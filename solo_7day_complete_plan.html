function buildTL(){
  const c=document.getElementById('tl');
  DAYS.forEach((d,i)=>{
    const pc=PHASES[d.phase]||{bg:"#F1EFE8",c:"#444441"};
    const el=document.createElement('div');
    el.className='dc';
    const blocks=d.blocks.map(b=>{
      const fc=b.feat&&FEAT_COLORS[b.feat]?FEAT_COLORS[b.feat]:{bg:"#F1EFE8",c:"#888780"};
      const tasks=b.tasks.map(t=>`<div class="task">${t.replace(/<code>/g,'<span class="cmd">').replace(/<\/code>/g,'</span>').replace(/<b>/g,'<strong>').replace(/<\/b>/g,'</strong>')}</div>`).join('');
      const featBadge=b.feat?`<span class="feat" style="background:${fc.bg};color:${fc.c}">${b.feat}</span>`:'';
      return`<div class="tblock">
        <div class="tblock-head" style="background:${b.bg}22;border-bottom:.5px solid ${b.bg}">
          <span class="time" style="background:${b.bg};color:${b.tc}">${b.time}</span>
          <span class="label">${b.label}</span>
          ${featBadge}
        </div>
        <div class="tasks-list">${tasks}</div>
      </div>`;
    }).join('');
    const dels=d.deliverables.map(d=>`<div class="drow">${d}</div>`).join('');
    el.innerHTML=`
      <div class="dh" onclick="this.parentElement.classList.toggle('open')">
        <span class="pb" style="background:${pc.bg};color:${pc.c}">${d.day} — ${d.phase}</span>
        <div class="dm"><div class="dt">${d.title}</div><div class="ds">${d.sub}</div></div>
        <span class="chev">▼</span>
      </div>
      <div class="db">
        <div class="tblocks">${blocks}</div>
        <div class="delv"><h4>End-of-day deliverables</h4>${dels}</div>
      </div>`;
    c.appendChild(el);
  });
  c.children[0].classList.add('open');
}

      <div class="pipe"><div class="pbox">6 PNG slides + 5 MP3 parts</div><span class="parr">→</span><div class="pbox">moviepy ImageClip + AudioFileClip</div><span class="parr">→</span><div class="pbox">Concatenate</div><span class="parr">→</span><div class="pbox">output.mp4</div></div>
    </div>
    <div class="scard"><h3>gTTS usage — completely free</h3>
      <div class="code">from gtts import gTTS
import os

def generate_audio(text: str, lang: str = 'en') -> str:
    # lang codes: 'en', 'hi', 'ta', 'te', 'bn'
    tts = gTTS(text=text, lang=lang, slow=False)
    filepath = f"static/audio/{hash(text)}.mp3"
    tts.save(filepath)
    return filepath

# Get duration
from moviepy.editor import AudioFileClip
duration = AudioFileClip(filepath).duration</div>
    </div>
    <div class="scard"><h3>Pillow slide generation — completely free</h3>
      <div class="code">from PIL import Image, ImageDraw, ImageFont

def make_title_slide(headline: str, date: str) -> Image:
    img = Image.new('RGB', (1920, 1080), '#FAF9F7')  # ET off-white bg
    draw = ImageDraw.Draw(img)
    # ET red header bar
    draw.rectangle([0, 0, 1920, 100], fill='#C0392B')
    # ET Intelligence text
    draw.text((40, 35), 'ET Intelligence', fill='white', font=font_bold_36)
    # Article headline — auto-wrap at 60 chars
    lines = textwrap.wrap(headline, width=60)
    y = 250
    for line in lines:
        draw.text((120, y), line, fill='#1A1A1A', font=font_bold_56)
        y += 80
    # Date bottom right
    draw.text((1700, 980), date, fill='#888780', font=font_reg_28)
    return img</div>
    </div>
    <div class="scard"><h3>moviepy assembly — completely free</h3>
      <div class="code">from moviepy.editor import ImageClip, AudioFileClip, concatenate_videoclips

def assemble_video(slides: list, audios: list, output_path: str):
    clips = []
    for slide_path, audio_path in zip(slides, audios):
        audio = AudioFileClip(audio_path)
        clip = ImageClip(slide_path).set_duration(audio.duration).set_audio(audio)
        clips.append(clip)
    
    final = concatenate_videoclips(clips, method='compose')
    final.write_videofile(output_path, fps=24, codec='libx264',
                         audio_codec='aac', logger=None)
    return output_path</div>

        <li>Strategy: pre-generate 4 demo videos on Day 5. Show live generation once during demo, then show the pre-made library.</li>
      </ul>
    </div>`;
}
